- name: Continuous Deployment using Ansible + Docker
  hosts: web

  tasks:

    - name: Stop old container
      command: docker rm -f camping-container
      ignore_errors: yes

    - name: Build Docker image
      command: docker build -t camping-app .

    - name: Run Docker container
      command: docker run -d -p 3000:3000 --name camping-container camping-app

